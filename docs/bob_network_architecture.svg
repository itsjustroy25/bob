<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Bob network architecture</title>
<desc>Shows the flow from internet user through Cloudflare tunnel to Nginx, Flask, and Ollama containers on the garage machine</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Internet user -->
<rect x="20" y="175" width="100" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="70" y="197" text-anchor="middle" dominant-baseline="central" fill="#0C447C">User</text>
<text font-family="sans-serif" font-size="12" x="70" y="215" text-anchor="middle" dominant-baseline="central" fill="#185FA5">browser</text>

<!-- HTTPS arrow -->
<line x1="120" y1="203" x2="158" y2="203" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="139" y="193" text-anchor="middle" fill="#555">HTTPS</text>

<!-- Cloudflare -->
<rect x="160" y="175" width="110" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="215" y="197" text-anchor="middle" dominant-baseline="central" fill="#633806">Cloudflare</text>
<text font-family="sans-serif" font-size="12" x="215" y="215" text-anchor="middle" dominant-baseline="central" fill="#854F0B">SSL + DDoS</text>

<!-- Tunnel arrow -->
<line x1="270" y1="203" x2="308" y2="203" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="289" y="193" text-anchor="middle" fill="#555">tunnel</text>

<!-- Garage machine container -->
<rect x="310" y="40" width="350" height="340" rx="16" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6 4"/>
<text font-family="sans-serif" font-size="12" x="485" y="62" text-anchor="middle" fill="#555">Garage machine (WSL)</text>

<!-- cloudflared agent -->
<rect x="325" y="80" width="120" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="385" y="102" text-anchor="middle" dominant-baseline="central" fill="#633806">cloudflared</text>

<!-- arrow cloudflared to nginx -->
<line x1="445" y1="102" x2="483" y2="102" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="464" y="92" text-anchor="middle" fill="#555">:80</text>

<!-- Nginx container -->
<rect x="485" y="80" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="545" y="97" text-anchor="middle" dominant-baseline="central" fill="#085041">Nginx</text>
<text font-family="sans-serif" font-size="12" x="545" y="114" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">rate limiting</text>

<!-- arrow nginx to flask -->
<line x1="545" y1="124" x2="545" y2="178" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="561" y="155" text-anchor="start" fill="#555">:5000</text>

<!-- Flask container -->
<rect x="485" y="180" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="545" y="202" text-anchor="middle" dominant-baseline="central" fill="#26215C">Flask</text>
<text font-family="sans-serif" font-size="12" x="545" y="220" text-anchor="middle" dominant-baseline="central" fill="#3C3489">LangChain + memory</text>

<!-- arrow flask to ollama -->
<line x1="545" y1="236" x2="545" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="561" y="267" text-anchor="start" fill="#555">:11434</text>

<!-- Ollama container -->
<rect x="485" y="292" width="120" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="545" y="314" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Ollama</text>
<text font-family="sans-serif" font-size="12" x="545" y="332" text-anchor="middle" dominant-baseline="central" fill="#712B13">llama3.2:3b / bob</text>

<!-- GPU label -->
<rect x="325" y="292" width="130" height="44" rx="8" fill="none" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>
<text font-family="sans-serif" font-size="12" x="390" y="310" text-anchor="middle" fill="#555">GTX 1070</text>
<text font-family="sans-serif" font-size="12" x="390" y="326" text-anchor="middle" fill="#555">8GB VRAM</text>

<!-- itsjustbob.chat label -->
<text font-family="sans-serif" font-size="12" x="215" y="155" text-anchor="middle" fill="#555">itsjustbob.chat</text>
<line x1="215" y1="160" x2="215" y2="173" stroke="#aaa" stroke-width="0.5"/>
</svg>
