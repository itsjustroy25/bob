<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bob | Deeply Disappointed</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #cc0000;
            font-family: monospace;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
			text-align: center;
        }
        h1 { color: #cc0000; }
        #chat-box {
            border: 1px solid #cc0000;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin: 20px 0;
            background: #050505;
			width: 100%;
			box-sizing: border-box;
			text-align: left;
        }
        .user-msg { color: #888; margin: 10px 0; }
        .bob-msg { color: #cc0000; margin: 10px 0; }
        input[type="text"] {
            width: 85%;
            background: #050505;
            color: #cc0000;
            border: 1px solid #cc0000;
            padding: 10px;
            font-family: monospace;
			text-align: left;
        }
		.input-wrapper {
			text-align: left;
			width: 100%;
			box-sizing: border-box;
		}
        button {
            background: #cc0000;
            color: #0a0a0a;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }
        button:hover { background: #ff0000; }
        #status { color: #444; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>BOB</h1>
    <p>Bob is disappointed in you. Bob is disappointed in everything.<br>
    Bob is especially disappointed in himself for caring.</p>
    <div id="chat-box">
        <div class="bob-msg">BOB: Oh good. Another human. 
        How thoroughly underwhelming.</div>
    </div>
	<div class="input-wrapper">
        <input type="text" id="user-input" 
               placeholder="Say something. Bob probably doesn't care." 
               onkeypress="if(event.key==='Enter')sendMessage()"/>
        <button onclick="sendMessage()">SEND</button>
    </div>
    <p id="status"></p>

    <script>
		async function sendMessage() {
			const input = document.getElementById('user-input');
			const chatBox = document.getElementById('chat-box');
			const status = document.getElementById('status');
			const message = input.value.trim();
			const now = new Date();
			const timeOptions = {
			    hour: 'numeric',
			    minute: '2-digit',
			    hour12: true,
			    timeZoneName: 'short'
			};
			const dateOptions = {
			    weekday: 'long',
			    year: 'numeric',
			    month: 'long',
			    day: 'numeric'
			};
			const timeContext = `Current time is ${now.toLocaleTimeString('en-US', timeOptions)} on ${now.toLocaleDateString('en-US', dateOptions)}`;
			if (!message) return;
			const MAX_INPUT_LENGTH = 512;

			const displayMessage = message.length > MAX_INPUT_LENGTH
			    ? message.substring(0, MAX_INPUT_LENGTH) + '... [truncated]'
			    : message;

			chatBox.innerHTML += `<div class="user-msg">YOU: ${displayMessage}</div>`;
			chatBox.scrollTop = chatBox.scrollHeight;

			let messageToSend = message;
			if (message.length > MAX_INPUT_LENGTH) {
			    messageToSend = `The user just dumped ${message.length} characters at me in a single message instead of having an actual conversation.`;
			}
			messageToSend = `{time:${timeContext}} ${messageToSend}`;

			input.value = '';
			status.textContent = 'Bob is formulating his disappointment...';

			try {
				const response = await fetch('/chat', {
					method: 'POST',
					headers: {'Content-Type': 'application/json'},
					body: JSON.stringify({message: messageToSend})
				});
				const data = await response.json();
				chatBox.innerHTML += `<div class="bob-msg">BOB: ${data.response}</div>`;
				chatBox.scrollTop = chatBox.scrollHeight;
				status.textContent = '';
			} catch(err) {
				status.textContent = 'Bob refused to respond. Even for him, that is impressive.';
			}
		}
    </script>
</body>
</html>
