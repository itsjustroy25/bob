events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=bob:10m rate=10r/m;

    server {
        listen 80;

        location / {
            limit_req zone=bob burst=5 nodelay;
            
            proxy_pass http://192.168.1.122:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
